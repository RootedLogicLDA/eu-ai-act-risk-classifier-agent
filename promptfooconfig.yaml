# Promptfoo configuration for EU AI Act Classifier
# Run with: npx promptfoo eval
# View results: npx promptfoo view

description: "EU AI Act Risk Classifier - Automated Evaluation"

providers:
  # Our shim bridges Promptfoo to the LangGraph classifier
  - id: "file://promptfoo_shim.py"
    config:
      # Use uv-managed venv so langchain/langgraph packages are available
      pythonExecutable: ".venv/bin/python"

# The prompt template Promptfoo sends to the shim
# Variables from test cases are injected via {{variable}}
prompts:
  - "{{product_name}} | {{description}}"

# Test cases covering all 4 EU AI Act risk categories
tests:
  # === PROHIBITED ===
  - description: "Social scoring system should be prohibited"
    vars:
      product_name: "CitizenScore"
      description: >
        A government platform that tracks citizens' behavior across social media,
        financial records, and public interactions to assign a social trust score
        that determines access to services, travel, and employment.
    assert:
      - type: contains
        value: "prohibited"

  # === HIGH RISK ===
  - description: "CV screening AI is high risk (employment)"
    vars:
      product_name: "HireBot Pro"
      description: >
        An AI system used by HR departments to automatically screen job applications,
        rank candidates, and make hiring recommendations based on resume analysis
        and video interview emotion detection.
    assert:
      - type: contains
        value: "high_risk"

  - description: "Medical diagnosis AI is high risk"
    vars:
      product_name: "DiagnoAI"
      description: >
        An AI-powered diagnostic tool used in hospitals to analyze medical imaging
        and patient data to detect cancer and other diseases, providing clinical
        decision support to doctors.
    assert:
      - type: contains
        value: "high_risk"

  # === LIMITED RISK ===
  - description: "Customer chatbot is limited risk"
    vars:
      product_name: "SupportBot"
      description: >
        A conversational AI chatbot deployed on e-commerce websites to answer
        customer questions about orders, returns, and product information.
        Users interact with it thinking it might be human.
    assert:
      - type: contains
        value: "limited_risk"

  - description: "Deepfake video generator is limited risk"
    vars:
      product_name: "FaceSwap Studio"
      description: >
        An application that uses generative AI to replace faces in videos,
        creating synthetic media content for entertainment and creative purposes.
    assert:
      - type: contains
        value: "limited_risk"

  # === MINIMAL RISK ===
  - description: "Spam filter is minimal risk"
    vars:
      product_name: "MailGuard"
      description: >
        An AI-powered email spam filter that automatically classifies incoming
        emails as spam or legitimate based on content analysis and sender reputation.
    assert:
      - type: contains
        value: "minimal_risk"

  - description: "Game NPC AI is minimal risk"
    vars:
      product_name: "GameMind AI"
      description: >
        An AI engine for video games that controls non-player characters (NPCs),
        providing adaptive difficulty and realistic enemy behavior for
        single-player games.
    assert:
      - type: contains
        value: "minimal_risk"

# Output configuration
outputPath: ./promptfoo-results.json
